<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GemHub コンシェルジュ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f7;
  --surface: #ffffff;
  --surface2: #f7f8fc;
  --border: rgba(0,0,0,0.08);
  --border-mid: rgba(0,0,0,0.13);
  --accent: #1a73e8;
  --accent-bg: rgba(26,115,232,0.08);
  --accent-dark: #1557b0;
  --gold: #f59e0b;
  --gold-bg: rgba(245,158,11,0.1);
  --gold-dark: #92400e;
  --green: #34a853;
  --green-bg: rgba(52,168,83,0.1);
  --text: #1f2937;
  --text2: #4b5563;
  --text3: #9ca3af;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  --radius: 12px;
  --font: 'Noto Sans JP', sans-serif;
  --mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100%;
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
}

/* ── HEADER ── */
.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border-mid);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #1a73e8, #34a853);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #fff; font-weight: 800; flex-shrink: 0;
}
.header-text h1 {
  font-size: 15px; font-weight: 700; line-height: 1.2;
}
.header-text p {
  font-size: 10.5px; color: var(--text3); font-family: var(--mono); margin-top: 1px;
}
.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
}
.gem-count-badge {
  font-family: var(--mono); font-size: 10px;
  background: var(--accent-bg); color: var(--accent);
  border: 1px solid rgba(26,115,232,0.2);
  border-radius: 20px; padding: 3px 10px;
  white-space: nowrap;
}
.key-btn {
  font-size: 11px; font-family: var(--font);
  padding: 5px 12px; border-radius: 20px;
  border: 1.5px solid var(--border-mid);
  background: var(--surface2); color: var(--text2);
  cursor: pointer; transition: all .15s; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.key-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.key-btn.has-key { border-color: var(--green); color: var(--green); background: var(--green-bg); }

/* ── MAIN LAYOUT ── */
.app-body {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ── CHAT AREA ── */
.chat-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border-mid) transparent;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }

/* Welcome state */
.welcome-panel {
  text-align: center;
  padding: 32px 20px 16px;
  max-width: 560px;
  margin: 0 auto;
  width: 100%;
}
.welcome-icon { font-size: 40px; margin-bottom: 12px; }
.welcome-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.welcome-desc {
  font-size: 13px; color: var(--text2); line-height: 1.8;
  margin-bottom: 20px;
}

/* Example chips */
.examples-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.examples-label { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.shuffle-btn {
  font-size: 11px; font-family: var(--font);
  padding: 3px 10px; border-radius: 12px;
  border: 1.5px solid var(--border-mid);
  background: transparent; color: var(--text3);
  cursor: pointer; transition: all .14s;
  display: flex; align-items: center; gap: 4px;
}
.shuffle-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.shuffle-icon { display: inline-block; transition: transform .35s; }
.shuffle-btn.spin .shuffle-icon { animation: spin-once .35s ease; }
@keyframes spin-once { from { transform: rotate(0) } to { transform: rotate(360deg) } }

.examples-grid {
  display: flex; flex-direction: column; gap: 6px;
  text-align: left;
}
.example-chip {
  padding: 9px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--border-mid);
  background: var(--surface);
  color: var(--text2);
  font-family: var(--font); font-size: 12px;
  cursor: pointer; text-align: left; line-height: 1.5;
  transition: all .13s;
}
.example-chip:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
.example-chip::before { content: '💬 '; opacity: .6; }

/* Messages */
.msg-user {
  display: flex; justify-content: flex-end;
}
.msg-user-bubble {
  background: var(--accent);
  color: #fff;
  padding: 10px 14px;
  border-radius: 16px 16px 4px 16px;
  max-width: 80%;
  font-size: 13px; line-height: 1.6;
  word-break: break-word;
}
.msg-ai {
  display: flex; gap: 10px; align-items: flex-start;
}
.ai-avatar {
  width: 30px; height: 30px; flex-shrink: 0;
  background: linear-gradient(135deg, #1a73e8, #34a853);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff; font-weight: 800;
  margin-top: 2px;
}
.msg-ai-bubble {
  flex: 1; min-width: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  font-size: 13px; line-height: 1.85;
  color: var(--text);
}
.msg-ai-bubble p { margin: 0 0 8px; }
.msg-ai-bubble p:last-child { margin: 0; }
.msg-ai-bubble strong { font-weight: 700; }

/* Goal badge */
.goal-badge {
  display: flex; align-items: flex-start; gap: 6px;
  background: var(--gold-bg);
  border: 1px solid rgba(245,158,11,0.25);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 12px; font-weight: 600; color: var(--gold-dark);
  margin-bottom: 12px;
  word-break: break-word;
}
.goal-badge::before { content: '🎯'; flex-shrink: 0; }

/* Loading dots */
.loading-bubble {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 16px;
}
.dots { display: flex; gap: 4px; }
.dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text3);
  animation: dot-bounce .9s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .18s; }
.dots span:nth-child(3) { animation-delay: .36s; }
@keyframes dot-bounce {
  0%, 80%, 100% { transform: scale(.5); opacity: .4; }
  40%            { transform: scale(1); opacity: 1; }
}
.loading-label { font-size: 11px; color: var(--text3); }

/* Gem links */
.gem-link {
  color: var(--accent); font-weight: 600;
  text-decoration: none;
  border-bottom: 1px dotted rgba(26,115,232,.4);
  padding: 0 1px;
  transition: all .1s;
}
.gem-link:hover { background: var(--accent-bg); border-radius: 2px; border-bottom-style: solid; }

/* Error */
.error-bubble {
  background: rgba(229,57,53,.07);
  border: 1px solid rgba(229,57,53,.2);
  border-radius: 8px;
  padding: 12px 14px;
  color: #c62828;
  font-size: 12.5px; line-height: 1.6;
}

/* New chat btn */
.new-chat-row {
  margin-top: 12px;
}
.new-chat-btn {
  width: 100%;
  padding: 9px;
  border: 1.5px dashed var(--border-mid);
  border-radius: 8px;
  background: transparent;
  color: var(--text3);
  font-family: var(--font); font-size: 12px;
  cursor: pointer; transition: all .14s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.new-chat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* ── INPUT AREA ── */
.input-area {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border-mid);
  background: var(--surface2);
  flex-shrink: 0;
}
.random-btn {
  width: 100%;
  padding: 8px 14px;
  border-radius: 8px;
  border: 1.5px solid var(--gold);
  background: transparent;
  color: var(--gold-dark);
  font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .14s; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.random-btn:hover { background: var(--gold-bg); }
.random-btn:active { transform: scale(.98); }
.divider {
  display: flex; align-items: center; gap: 8px;
  margin: 8px 0;
  color: var(--text3); font-size: 11px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.input-wrap {
  display: flex; gap: 8px; align-items: flex-end;
}
.goal-input {
  flex: 1;
  border: 1.5px solid var(--border-mid);
  border-radius: 10px;
  padding: 9px 12px;
  font-size: 13px; font-family: var(--font);
  color: var(--text); outline: none;
  resize: none; background: var(--surface);
  line-height: 1.55; max-height: 120px;
  transition: border-color .2s, box-shadow .2s;
  min-height: 40px;
}
.goal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,115,232,.1); }
.goal-input::placeholder { color: var(--text3); }
.send-btn {
  flex-shrink: 0;
  width: 40px; height: 40px;
  border-radius: 10px;
  border: none;
  background: var(--accent); color: #fff;
  font-size: 16px;
  cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
.send-btn:disabled { background: var(--border-mid); cursor: default; transform: none; }
.input-hint { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 5px; text-align: right; }

/* ── GEM LIST SIDEBAR ── */
.gem-sidebar {
  width: 280px;
  border-left: 1px solid var(--border-mid);
  background: var(--surface);
  display: flex; flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.gem-sidebar-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.gem-sidebar-title {
  font-size: 11px; font-weight: 700; color: var(--text2);
  font-family: var(--mono); letter-spacing: .06em;
  text-transform: uppercase; margin-bottom: 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-search {
  width: 100%;
  border: 1.5px solid var(--border-mid); border-radius: 20px;
  padding: 5px 10px 5px 28px; font-size: 12px;
  font-family: var(--font); color: var(--text); outline: none;
  background: var(--surface2); position: relative;
  transition: border-color .2s;
}
.sidebar-search:focus { border-color: var(--accent); }
.sidebar-search-wrap { position: relative; }
.sidebar-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 11px; pointer-events: none; color: var(--text3);
}
.gem-list {
  overflow-y: auto; flex: 1; padding: 6px;
  scrollbar-width: thin; scrollbar-color: var(--border-mid) transparent;
}
.gem-list::-webkit-scrollbar { width: 4px; }
.gem-list::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
.cat-group { margin-bottom: 4px; }
.cat-label-btn {
  display: flex; align-items: center; gap: 6px; width: 100%;
  padding: 5px 8px; border-radius: 6px;
  border: none; background: transparent;
  font-family: var(--font); font-size: 11px; font-weight: 600;
  color: var(--text2); cursor: pointer; text-align: left;
  transition: background .12s;
}
.cat-label-btn:hover { background: var(--accent-bg); color: var(--accent); }
.cat-label-btn.sop { color: #92400e; }
.cat-label-btn.sop:hover { background: rgba(245,158,11,.1); }
.sop-chip {
  font-family: var(--mono); font-size: 8px; font-weight: 700;
  background: rgba(245,158,11,.12); color: #92400e;
  border: 1px solid rgba(245,158,11,.28); border-radius: 3px;
  padding: 1px 4px; flex-shrink: 0;
}
.cat-gems { padding-left: 16px; }
.gem-item {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 8px; border-radius: 5px;
  cursor: pointer; transition: background .1s;
  font-size: 11px; color: var(--text2); line-height: 1.4;
}
.gem-item:hover { background: var(--accent-bg); color: var(--accent); }
.gem-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.cat-chevron { font-size: 8px; color: var(--text3); margin-left: auto; transition: transform .2s; flex-shrink: 0; }
.cat-group.closed .cat-chevron { transform: rotate(-90deg); }
.cat-group.closed .cat-gems { display: none; }

/* ── API KEY MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.35); z-index: 300;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border-radius: 16px;
  padding: 24px; width: 100%; max-width: 400px;
  box-shadow: 0 8px 40px rgba(0,0,0,.2);
  animation: modal-in .2s ease;
}
@keyframes modal-in { from { opacity: 0; transform: scale(.95) } to { opacity: 1; transform: scale(1) } }
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.modal-desc { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }
.modal-link { color: var(--accent); text-decoration: none; }
.modal-link:hover { text-decoration: underline; }
.modal-input {
  width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
  padding: 9px 12px; font-size: 13px; font-family: var(--mono);
  color: var(--text); outline: none; background: var(--surface2);
  transition: border-color .2s;
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 16px; border-radius: 8px; border: 1.5px solid var(--border-mid); background: var(--surface); color: var(--text2); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .gem-sidebar { display: none; }
  .chat-messages { padding: 14px; }
}

/* Scroll to bottom animation */
.fade-in { animation: fadeUp .25s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo-mark">G</div>
  <div class="header-text">
    <h1>Gem Hub コンシェルジュ</h1>
    <p>目的を入力 → 最適なGemワークフローをAIが提案</p>
  </div>
  <div class="header-right">
    <span class="gem-count-badge" id="gemCountBadge">172 Gems</span>
    <button class="key-btn" id="keyBtn" onclick="openKeyModal()">
      🔑 <span id="keyBtnLabel">APIキー設定</span>
    </button>
  </div>
</header>

<div class="app-body">

  <div class="chat-col">
    <div class="chat-messages" id="chatMessages">
      </div>

    <div class="input-area">
      <button class="random-btn" id="randomBtn" onclick="randomFill()">
        🎲 自動作成 — クリックするたびに違うアイデアを入力
      </button>
      <div class="divider">または自分で入力</div>
      <div class="input-wrap">
        <textarea class="goal-input" id="goalInput"
          placeholder="例：恋愛系スピリチュアルのIG投稿を10本作ってBufferに予約設定したい&#10;&#10;Ctrl/Cmd+Enter で送信"
          rows="2" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="runConcierge()" title="送信">↑</button>
      </div>
      <div class="input-hint">Ctrl + Enter で送信</div>
    </div>
  </div>

  <aside class="gem-sidebar">
    <div class="gem-sidebar-header">
      <div class="gem-sidebar-title">
        <span>登録済みGem</span>
        <span id="sidebarCount" style="font-size:10px;color:var(--text3)">172件</span>
      </div>
      <div class="sidebar-search-wrap">
        <span class="sidebar-search-icon">🔍</span>
        <input class="sidebar-search" type="text" id="sidebarSearch"
          placeholder="Gemを検索..." oninput="filterGems(this.value)">
      </div>
    </div>
    <div class="gem-list" id="gemList"></div>
  </aside>

</div>

<div class="modal-overlay" id="keyModal">
  <div class="modal">
    <div class="modal-title">🔑 Gemini APIキーを設定</div>
    <div class="modal-desc">
      <a href="https://aistudio.google.com/app/apikey" target="_blank" class="modal-link">Google AI Studio</a>
      で取得したAPIキー（<code style="font-family:var(--mono);font-size:11px">AIza...</code>）を入力してください。<br>
      キーはこのブラウザの localStorage に保存され、外部には送信されません。
    </div>
    <input type="password" class="modal-input" id="keyInput" placeholder="AIza...">
    <div class="modal-actions">
      <button class="btn" onclick="closeKeyModal()">キャンセル</button>
      <button class="btn primary" onclick="saveKey()">💾 保存</button>
    </div>
  </div>
</div>

<script>

// ─── State ───────────────────────────────────────────────
let apiKey = '';
let ideaPool = [], ideaIdx = 0;
let isLoading = false;

try { apiKey = localStorage.getItem('gemhub_concierge_key') || ''; } catch(e) {}

// ─── Utility ─────────────────────────────────────────────
function buildGemListText() {
  let s = '';
  GEM_CATS.forEach(cat => {
    s += `\n■ ${cat.name}\n`;
    cat.gems.forEach(g => { s += `  - ${g.name}\n`; });
  });
  return s;
}

function findGemUrl(name) {
  for (const cat of GEM_CATS) {
    const g = cat.gems.find(g => g.name === name);
    if (g) return g.url;
    const key = name.substring(0, 12).toLowerCase();
    const g2 = cat.gems.find(g => g.name.toLowerCase().substring(0, 12) === key);
    if (g2) return g2.url;
  }
  return null;
}

function linkifyGems(text) {
  let result = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  GEM_CATS.forEach(cat => {
    cat.gems.forEach(gem => {
      const safe = gem.name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      result = result.replace(
        new RegExp(`(${safe})`, 'g'),
        `<a class="gem-link" href="${gem.url}" target="_blank">$1 ↗</a>`
      );
    });
  });
  return result
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function totalGems() {
  return GEM_CATS.reduce((a,c) => a + c.gems.length, 0);
}

// ─── Key Modal ───────────────────────────────────────────
function openKeyModal() {
  document.getElementById('keyInput').value = apiKey;
  document.getElementById('keyModal').classList.add('show');
  setTimeout(() => document.getElementById('keyInput').focus(), 80);
}
function closeKeyModal() {
  document.getElementById('keyModal').classList.remove('show');
}
function saveKey() {
  const v = document.getElementById('keyInput').value.trim();
  if (!v) return;
  apiKey = v;
  try { localStorage.setItem('gemhub_concierge_key', apiKey); } catch(e) {}
  updateKeyBtn();
  closeKeyModal();
}
function updateKeyBtn() {
  const btn = document.getElementById('keyBtn');
  const lbl = document.getElementById('keyBtnLabel');
  if (apiKey) {
    btn.classList.add('has-key');
    lbl.textContent = 'APIキー設定済み';
  } else {
    btn.classList.remove('has-key');
    lbl.textContent = 'APIキー設定';
  }
}

// ─── Example ideas ───────────────────────────────────────
function shuffleIdeas() {
  ideaPool = IDEAS.map((_,i)=>i).sort(()=>Math.random()-.5);
  ideaIdx  = 0;
}
function pickIdea() {
  if (ideaIdx >= ideaPool.length) shuffleIdeas();
  return IDEAS[ideaPool[ideaIdx++]];
}
function renderExamples() {
  const c = document.getElementById('examplesGrid');
  if (!c) return;
  const picked = [];
  for (let i=0; i<5; i++) picked.push(pickIdea());
  c.innerHTML = picked.map(q =>
    `<button class="example-chip" onclick="fillGoal(this.dataset.q)" data-q="${q.replace(/"/g,'&quot;')}">${q}</button>`
  ).join('');
}
function shuffleBtn(btn) {
  btn.classList.add('spin');
  setTimeout(() => btn.classList.remove('spin'), 380);
  renderExamples();
}
function fillGoal(q) {
  const inp = document.getElementById('goalInput');
  inp.value = q; inp.focus(); autoResize(inp);
}
function randomFill() {
  fillGoal(pickIdea());
  const btn = document.getElementById('randomBtn');
  btn.style.background = 'rgba(245,158,11,.18)';
  setTimeout(() => btn.style.background = '', 280);
}

// ─── Gem Sidebar ─────────────────────────────────────────
function renderGemSidebar(filter='') {
  const fl = filter.toLowerCase();
  const list = document.getElementById('gemList');
  let html = '';
  GEM_CATS.forEach((cat, ci) => {
    const visGems = fl
      ? cat.gems.filter(g => g.name.toLowerCase().includes(fl))
      : cat.gems;
    if (fl && visGems.length === 0) return;
    const isSop = cat.sop === true;
    const label = isSop
      ? `<span class="sop-chip">${cat.sopTag}</span><span>${cat.name}</span>`
      : `<span>${cat.icon||'📌'}</span><span>${cat.name}</span>`;
    html += `<div class="cat-group${fl?'':''}" id="cg-${ci}">
      <button class="cat-label-btn${isSop?' sop':''}" onclick="toggleCatGroup(${ci})">
        ${label}
        <span class="cat-chevron">▼</span>
      </button>
      <div class="cat-gems">`;
    visGems.forEach(g => {
      html += `<div class="gem-item" onclick="fillGoalWithGem('${g.name.replace(/'/g,"\\'")}')">
        <span class="gem-dot"></span>
        <span>${fl ? g.name.replace(new RegExp(`(${filter.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark style="background:#fef08a">$1</mark>') : g.name}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  list.innerHTML = html || '<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">見つかりません</div>';
}
function toggleCatGroup(ci) {
  const el = document.getElementById('cg-' + ci);
  if (el) el.classList.toggle('closed');
}
function filterGems(v) { renderGemSidebar(v.trim()); }
function fillGoalWithGem(name) {
  const inp = document.getElementById('goalInput');
  inp.value = `「${name}」を使って〜したい`;
  inp.focus(); autoResize(inp);
}

// ─── Chat ────────────────────────────────────────────────
function showWelcome() {
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = `
    <div class="welcome-panel fade-in">
      <div class="welcome-icon">✨</div>
      <div class="welcome-title">Gem Hub コンシェルジュ</div>
      <div class="welcome-desc">
        達成したい目的を入力すると、<br>
        <strong>登録済み ${totalGems()} 個のGem</strong> の中から<br>
        最適な使用順序とワークフローをAIが提案します。
      </div>
      <div class="examples-header">
        <span class="examples-label">💬 サンプル (5/${IDEAS.length})</span>
        <button class="shuffle-btn" onclick="shuffleBtn(this)">
          <span class="shuffle-icon">🔄</span> 別のアイデアを見る
        </button>
      </div>
      <div class="examples-grid" id="examplesGrid"></div>
    </div>`;
  renderExamples();
}

function appendMsg(html, cls='fade-in') {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function appendUserMsg(text) {
  appendMsg(`<div class="msg-user">
    <div class="msg-user-bubble">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  </div>`);
}

function appendLoadingMsg() {
  const id = 'loading-' + Date.now();
  appendMsg(`<div class="msg-ai" id="${id}">
    <div class="ai-avatar">G</div>
    <div class="msg-ai-bubble">
      <div class="loading-bubble">
        <div class="dots"><span></span><span></span><span></span></div>
        <span class="loading-label">AIが分析中…</span>
      </div>
    </div>
  </div>`);
  return id;
}

function replaceLoading(id, html) {
  const el = document.getElementById(id);
  if (el) el.outerHTML = html;
  const msgs = document.getElementById('chatMessages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ─── API Call ────────────────────────────────────────────
const SYSTEM_PROMPT = `あなたは「Gem Hub コンシェルジュ」です。SNSコンテンツ制作・アフィリエイト・スピリチュアル×恋愛ニッチを専門とするクリエイターの作業効率化を支援します。

【役割】ユーザーの目的に対して、以下の【登録済みGemリスト】から最適なGemを選び、実行可能なワークフローを日本語で提案します。

【提案ルール】
1. 必ずリストに記載された正確なGem名のみを使用（一字一句変えない）
2. 各ステップは以下の形式で記述：
   **STEP N：【Gem名 or 手動作業】**
   役割：このステップで何をするか
   入力：何を入力するか（具体例）
   出力：何が得られるか
   次への渡し方：次のステップへのデータの引き継ぎ方
3. ステップ数は3〜10程度（目的の規模に応じて）
4. リストにないGemが必要な工程は「手動作業」や「汎用Geminiプロンプト」と明記
5. 最後に合計所要時間の目安を添える
6. 現在のGemリストで対応困難な要望は正直に「対応が難しい理由」と「代替案」を提示`;

async function runConcierge() {
  if (isLoading) return;
  const inp  = document.getElementById('goalInput');
  const goal = inp.value.trim();
  if (!goal) { inp.focus(); return; }

  if (!apiKey) {
    openKeyModal();
    return;
  }

  // Clear welcome, add messages
  const msgs = document.getElementById('chatMessages');
  if (msgs.querySelector('.welcome-panel')) msgs.innerHTML = '';

  appendMsg(`<div class="goal-badge">${goal.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>`);
  inp.value = ''; autoResize(inp);
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const loadId = appendLoadingMsg();
  const userPrompt = `目的：${goal}\n\n【登録済みGemリスト】${buildGemListText()}`;

  try {
    const ENDPOINT = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
    const res = await fetch(ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
        contents: [{ role: 'user', parts: [{ text: userPrompt }] }],
        generationConfig: { temperature: 0.65, maxOutputTokens: 8000 }
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'APIエラー');
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('応答テキストが見つかりません');

    replaceLoading(loadId, `<div class="msg-ai">
      <div class="ai-avatar">G</div>
      <div class="msg-ai-bubble">
        <div>${linkifyGems(text)}</div>
        <div class="new-chat-row">
          <button class="new-chat-btn" onclick="showWelcome()">＋ 新しい目的で相談する</button>
        </div>
      </div>
    </div>`);
  } catch(err) {
    const isFetch = err.message.includes('fetch') || err.message.includes('network');
    replaceLoading(loadId, `<div class="msg-ai">
      <div class="ai-avatar">G</div>
      <div class="msg-ai-bubble">
        <div class="error-bubble">
          ${isFetch
            ? '⚠️ 通信エラー（Failed to fetch）<br><br>このHTMLファイルはブラウザで直接開いたときのみ動作します。Claude.ai のプレビュー画面ではCORS制限により外部APIへの通信がブロックされます。<br><br><strong>→ ダウンロードしたHTMLをブラウザで直接開いてください。</strong>'
            : `❌ エラー：${err.message.replace(/&/g,'&amp;').replace(/</g,'&lt;')}`}
        </div>
        <div class="new-chat-row">
          <button class="new-chat-btn" onclick="showWelcome()">再試行</button>
        </div>
      </div>
    </div>`);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ─── Auto resize textarea ─────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ─── Init ────────────────────────────────────────────────
function init() {
  shuffleIdeas();
  updateKeyBtn();
  const total = totalGems();
  document.getElementById('gemCountBadge').textContent = total + ' Gems';
  document.getElementById('sidebarCount').textContent  = total + '件';
  showWelcome();
  renderGemSidebar();

  // keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeKeyModal();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      if (!document.getElementById('keyModal').classList.contains('show')) {
        runConcierge();
      }
    }
    if (e.key === 'Enter' && document.getElementById('keyModal').classList.contains('show')) {
      saveKey();
    }
  });

  // close modal on overlay click
  document.getElementById('keyModal').addEventListener('click', function(e) {
    if (e.target === this) closeKeyModal();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
